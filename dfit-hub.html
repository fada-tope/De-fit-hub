<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'Fit Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
}

.card{
    position:relative;
    z-index:1;
    width:360px;
    text-align:center;
    color:white;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    animation: slideIn 0.6s ease-out;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1{
    font-size:36px;
    margin-bottom:10px;
    font-weight:bold;
}

p{
    margin-bottom:25px;
    color:#ddd;
    font-size:16px;
}

.btn{
    display:block;
    margin:15px 0;
    padding:15px;
    border-radius:12px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
    border:none;
    cursor:pointer;
}

.btn:hover{
    transform:scale(1.05);
}

.whatsapp{
    background:#25D366;
    color:white;
}

.whatsapp:hover {
    background:#20ba5a;
    box-shadow: 0 8px 16px rgba(37, 211, 102, 0.4);
}

.tiktok{
    background:#000;
    color:white;
}

.tiktok:hover {
    background:#333;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
}

.snapchat{
    background:#FFFC00;
    color:black;
}

.snapchat:hover {
    background:#ffff00;
    box-shadow: 0 8px 16px rgba(255, 252, 0, 0.4);
}

footer{
    margin-top:20px;
    color:#ccc;
    font-size:14px;
}

@media (max-width: 480px) {
    .card {
        width: 90%;
        padding: 25px;
    }
    
    h1 {
        font-size: 28px;
    }
    
    .btn {
        font-size: 16px;
        padding: 12px;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<h1>D'Fit Hub</h1>

<p>Fit Your Style 👕</p>

<a class="btn whatsapp"
href="https://wa.me/2347075846461"
target="_blank">
📱 Chat on WhatsApp
</a>

<a class="btn tiktok"
href="https://www.tiktok.com/@dfit.hub"
target="_blank">
🎵 Follow on TikTok
</a>

<a class="btn snapchat"
href="https://www.snapchat.com/add/papslatony"
target="_blank">
👻 Add on Snapchat
</a>

<footer>
Premium Style • Affordable Prices
</footer>

</div>

</body>
</html>
